<app-employee-application-dialog-shell
  [open]="open()"
  dialogId="basic-info-application-dialog"
  title="基本情報登録"
  description="現住所と給与振込先口座の情報を入力して申請してください。"
  (closed)="close()"
>
  <form class="application-form" [formGroup]="basicInfoForm" (ngSubmit)="submit()" novalidate autocomplete="off">
    @if (formError()) {
      <p class="application-form__error" role="alert">{{ formError() }}</p>
    }

    <label class="application-form__field">
      <span class="application-form__label">現住所</span>
      <textarea class="application-form__textarea" rows="2" formControlName="currentAddress"></textarea>
    </label>

    <label class="application-form__field">
      <span class="application-form__label">給与振込先金融機関</span>
      <input type="text" class="application-form__input" formControlName="bankName" autocomplete="off" />
    </label>

    <label class="application-form__field">
      <span class="application-form__label">口座番号</span>
      <input type="text" class="application-form__input" formControlName="accountNumber" autocomplete="off" />
    </label>
  </form>

  <div dialogActions>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--ghost"
      [disabled]="submitting()"
      (click)="close()"
    >
      キャンセル
    </button>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--primary"
      [disabled]="submitting()"
      (click)="submit()"
    >
      {{ submitting() ? '送信中...' : '申請する' }}
    </button>
  </div>
</app-employee-application-dialog-shell>
