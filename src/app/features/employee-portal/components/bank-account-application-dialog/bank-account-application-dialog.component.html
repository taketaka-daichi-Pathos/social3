<app-employee-application-dialog-shell
  [open]="open()"
  dialogId="bank-account-application-dialog"
  title="給与振込口座の登録・変更"
  description="給与の振込先口座を登録・変更する場合は、金融機関情報を入力して申請してください。"
  (closed)="close()"
>
  <form class="application-form" [formGroup]="bankAccountForm" (ngSubmit)="submit()" novalidate autocomplete="off">
    @if (formError()) {
      <p class="application-form__error" role="alert">{{ formError() }}</p>
    }

    <label class="application-form__field">
      <span class="application-form__label">金融機関名</span>
      <input type="text" class="application-form__input" formControlName="bankName" autocomplete="off" />
      @if (bankAccountForm.controls.bankName.touched && bankAccountForm.controls.bankName.invalid) {
        <p class="application-form__field-error">金融機関名を入力してください</p>
      }
    </label>

    <label class="application-form__field">
      <span class="application-form__label">支店名</span>
      <input type="text" class="application-form__input" formControlName="bankBranchName" autocomplete="off" />
      @if (
        bankAccountForm.controls.bankBranchName.touched &&
        bankAccountForm.controls.bankBranchName.invalid
      ) {
        <p class="application-form__field-error">支店名を入力してください</p>
      }
    </label>

    <label class="application-form__field">
      <span class="application-form__label">口座種別</span>
      <select class="application-form__input" formControlName="bankAccountType">
        @for (option of accountTypeOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </label>

    <label class="application-form__field">
      <span class="application-form__label">口座番号（数字のみ）</span>
      <input
        type="text"
        class="application-form__input"
        formControlName="bankAccountNumber"
        inputmode="numeric"
        autocomplete="off"
      />
      @if (
        bankAccountForm.controls.bankAccountNumber.touched &&
        bankAccountForm.controls.bankAccountNumber.invalid
      ) {
        <p class="application-form__field-error">4〜14桁の口座番号を入力してください</p>
      }
    </label>
  </form>

  <div dialogActions>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--ghost"
      [disabled]="submitting()"
      (click)="close()"
    >
      キャンセル
    </button>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--primary"
      [disabled]="submitting()"
      (click)="submit()"
    >
      {{ submitting() ? '送信中...' : '申請する' }}
    </button>
  </div>
</app-employee-application-dialog-shell>
