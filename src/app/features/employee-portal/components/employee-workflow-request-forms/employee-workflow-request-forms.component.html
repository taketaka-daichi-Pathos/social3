<section class="w-full rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
  <header class="mb-6">
    <h3 class="m-0 mb-1 text-lg font-bold text-gray-900">各種申請</h3>
    <p class="m-0 text-sm text-gray-500">
      休業・扶養の変更申請をこちらから送信できます。
    </p>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (item of menuItems; track item.id) {
      <button
        type="button"
        class="flex flex-row items-center p-5 text-left bg-white rounded-lg shadow hover:shadow-md transition-shadow border border-gray-200 w-full cursor-pointer"
        (click)="openDialog(item.id)"
      >
        <span
          class="mr-4 flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-blue-50 text-blue-600"
          aria-hidden="true"
        >
          @switch (item.icon) {
            @case ('leave') {
              <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                />
              </svg>
            }
            @case ('dependent') {
              <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>
            }
          }
        </span>
        <span class="min-w-0 flex-1">
          <span class="block text-sm font-bold leading-snug text-gray-900">{{ item.title }}</span>
          <span class="mt-1 block text-sm text-gray-500">{{ item.description }}</span>
        </span>
      </button>
    }
  </div>
</section>

<app-leave-application-dialog
  [open]="activeDialog() === 'leave'"
  [session]="session()"
  (closed)="closeDialog()"
  (submitted)="onApplicationSubmitted()"
/>

<app-dependent-application-dialog
  [open]="activeDialog() === 'dependent'"
  [session]="session()"
  (closed)="closeDialog()"
  (submitted)="onApplicationSubmitted()"
/>
