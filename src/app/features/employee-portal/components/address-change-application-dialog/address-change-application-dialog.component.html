<app-employee-application-dialog-shell
  [open]="open()"
  dialogId="address-change-application-dialog"
  title="住所変更申請"
  description="引越しなどで住所が変わった際は、新しい郵便番号と住所を入力して申請してください。"
  (closed)="close()"
>
  <form class="application-form" [formGroup]="addressForm" (ngSubmit)="submit()" novalidate autocomplete="off">
    @if (formError()) {
      <p class="application-form__error" role="alert">{{ formError() }}</p>
    }

    <label class="application-form__field">
      <span class="application-form__label">郵便番号（ハイフンなし7桁）</span>
      <input
        type="text"
        class="application-form__input"
        formControlName="postalCode"
        inputmode="numeric"
        maxlength="8"
        autocomplete="postal-code"
      />
      @if (addressForm.controls.postalCode.touched && addressForm.controls.postalCode.invalid) {
        <p class="application-form__field-error">7桁の郵便番号を入力してください</p>
      }
    </label>

    <label class="application-form__field">
      <span class="application-form__label">住所</span>
      <textarea
        class="application-form__textarea"
        rows="3"
        formControlName="address"
        placeholder="都道府県・市区町村・番地・建物名など"
      ></textarea>
      @if (addressForm.controls.address.touched && addressForm.controls.address.invalid) {
        <p class="application-form__field-error">住所を入力してください</p>
      }
    </label>
  </form>

  <div dialogActions>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--ghost"
      [disabled]="submitting()"
      (click)="close()"
    >
      キャンセル
    </button>
    <button
      type="button"
      class="application-dialog-btn application-dialog-btn--primary"
      [disabled]="submitting()"
      (click)="submit()"
    >
      {{ submitting() ? '送信中...' : '申請する' }}
    </button>
  </div>
</app-employee-application-dialog-shell>
