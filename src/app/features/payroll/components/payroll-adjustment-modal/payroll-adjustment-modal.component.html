@if (open()) {
  <div
    class="adjustment-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="adjustment-modal-title"
    (click)="onBackdropClick($event)"
  >
    <div class="adjustment-modal__panel">
      <header class="adjustment-modal__header">
        <div>
          <p class="adjustment-modal__label">金額調整</p>
          <h2 id="adjustment-modal-title" class="adjustment-modal__title">{{ employeeName() }}</h2>
        </div>
        <button type="button" class="adjustment-modal__close" aria-label="閉じる" (click)="close()">
          ×
        </button>
      </header>

      <form class="adjustment-modal__body" [formGroup]="form" (ngSubmit)="onConfirm()" novalidate autocomplete="off">
        <fieldset class="adjustment-modal__type-group">
          <legend class="adjustment-modal__field-label">調整の理由（種別）</legend>
          @for (option of adjustmentTypeOptions; track option.value) {
            <label
              class="adjustment-modal__type-option"
              [class.adjustment-modal__type-option--disabled]="isMidHireReductionDisabled(option)"
            >
              <input
                type="radio"
                formControlName="adjustmentType"
                [value]="option.value"
                [disabled]="isMidHireReductionDisabled(option)"
              />
              <span>{{ option.label }}</span>
            </label>
          }
        </fieldset>

        <div class="adjustment-modal__field">
          <label class="adjustment-modal__field-label" for="adjustmentAmount">調整額</label>
          <input
            id="adjustmentAmount"
            type="number"
            class="adjustment-modal__input"
            formControlName="adjustmentAmount"
            [attr.max]="amountMax()"
            [attr.min]="amountMin()"
            step="1"
            inputmode="numeric"
            autocomplete="off"
          />
        </div>

        @if (noteText()) {
          <p class="adjustment-modal__note">{{ noteText() }}</p>
        }

        @if (validationError()) {
          <p class="adjustment-modal__error" role="alert">{{ validationError() }}</p>
        }

        @if (totalFloorError()) {
          <p class="adjustment-modal__error" role="alert">{{ totalFloorError() }}</p>
        }

        <footer class="adjustment-modal__footer">
          <button
            type="button"
            class="adjustment-modal__btn adjustment-modal__btn--ghost"
            (click)="close()"
          >
            キャンセル
          </button>
          <button
            type="submit"
            class="adjustment-modal__btn adjustment-modal__btn--primary"
            [disabled]="hasBlockingError()"
          >
            確定
          </button>
        </footer>
      </form>
    </div>
  </div>
}
