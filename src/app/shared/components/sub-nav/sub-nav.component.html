<nav class="sub-nav" aria-label="サブナビゲーション">
  <ul class="sub-nav__list">
    @for (item of items(); track item.id) {
      <li class="sub-nav__item">
        <button
          type="button"
          class="sub-nav__btn"
          [class.sub-nav__btn--active]="item.id === activeId()"
          [attr.title]="item.showBadge && item.badgeTooltip ? item.badgeTooltip : null"
          (click)="onSelect(item)"
        >
          <span class="sub-nav__label">{{ item.label }}</span>
          @if (item.showBadge) {
            <span
              class="w-2 h-2 bg-red-500 rounded-full inline-block shrink-0"
              aria-hidden="true"
            ></span>
          }
        </button>
      </li>
    }
  </ul>
</nav>
