<nav class="global-nav" aria-label="メインナビゲーション">
  <ul class="global-nav__list">
    @for (item of items(); track item.route) {
      <li class="global-nav__item">
        <a
          class="global-nav__link"
          [routerLink]="item.route"
          routerLinkActive="global-nav__link--active"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="itemSelected.emit(item)"
        >
          <span class="global-nav__label">{{ item.label }}</span>
          @if (showBadge(item)) {
            <span class="global-nav__badge" aria-hidden="true"></span>
          }
        </a>
      </li>
    }
  </ul>
</nav>
